<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>岁蚀 - 番茄封面</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: "Source Han Serif SC", "Noto Serif SC", "SimSun", serif; }
  .cover {
    width: 800px; height: 1200px;
    position: relative;
    overflow: hidden;
    background: #16120d;
  }

  /* 背景 */
  .bg {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse at 50% 60%, rgba(72,54,34,0.85) 0%, transparent 55%),
      radial-gradient(ellipse at 30% 20%, rgba(105,76,48,0.55) 0%, transparent 50%),
      radial-gradient(ellipse at 70% 85%, rgba(42,55,72,0.38) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 10%, rgba(85,52,36,0.35) 0%, transparent 45%),
      #0a0806;
    z-index: 0;
  }

  /* 云层/远山 */
  .clouds {
    position: absolute; top: 80px; left: 0; right: 0; height: 200px;
    z-index: 1;
    opacity: 0.35;
  }
  .cloud {
    position: absolute;
    background: radial-gradient(ellipse at center, rgba(40,32,24,0.8) 0%, transparent 70%);
    border-radius: 50%;
    filter: blur(8px);
  }
  .cloud:nth-child(1) { width: 280px; height: 90px; top: 20px; left: -40px; }
  .cloud:nth-child(2) { width: 220px; height: 70px; top: 60px; left: 160px; }
  .cloud:nth-child(3) { width: 300px; height: 80px; top: 40px; right: -50px; }
  .cloud:nth-child(4) { width: 180px; height: 60px; top: 110px; right: 180px; }

  /* 暗角 */
  .vignette {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.5) 100%);
    z-index: 2;
  }
  .vignette-bottom {
    position: absolute; bottom: 0; left: 0; right: 0; height: 380px;
    background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 100%);
    z-index: 2;
  }

  /* 岁蚀侵蚀 */
  .erosion {
    position: absolute; top: -80px; right: -100px;
    width: 550px; height: 650px;
    background: radial-gradient(ellipse at center, rgba(220,210,185,0.1) 0%, rgba(220,210,185,0.04) 25%, transparent 60%);
    z-index: 3;
    filter: blur(35px);
  }
  .erosion-edge {
    position: absolute; right: 30px;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(220,210,185,0.18), transparent);
    z-index: 3;
    transform: rotate(-12deg);
  }
  .erosion-edge:nth-child(1) { top: 50px; width: 340px; }
  .erosion-edge:nth-child(2) { top: 85px; width: 240px; }
  .erosion-edge:nth-child(3) { top: 120px; width: 290px; }
  .erosion-edge:nth-child(4) { top: 160px; width: 180px; }

  /* 石门 */
  .door {
    position: absolute; left: 140px; top: 180px;
    width: 520px; height: 760px;
    z-index: 4;
  }
  .door-bg {
    position: absolute; inset: 0;
    background:
      repeating-linear-gradient(90deg,
        rgba(60,52,44,0.4) 0px, rgba(60,52,44,0.4) 2px,
        transparent 2px, transparent 38px),
      repeating-linear-gradient(0deg,
        rgba(55,48,40,0.5) 0px, rgba(55,48,40,0.5) 2px,
        transparent 2px, transparent 42px),
      linear-gradient(135deg, rgba(50,42,36,0.9), rgba(38,32,28,0.95));
    box-shadow: inset 0 0 120px rgba(0,0,0,0.6);
  }
  .door-frame {
    position: absolute; inset: 0;
    border: 3px solid rgba(165,142,105,0.35);
    box-shadow:
      0 0 80px rgba(120,95,65,0.15),
      inset 0 0 80px rgba(0,0,0,0.4);
  }
  .door-inner-frame {
    position: absolute; left: 18px; top: 18px; right: 18px; bottom: 18px;
    border: 1px solid rgba(90,76,62,0.25);
  }

  /* 石块纹理 */
  .stone {
    position: absolute;
    background: rgba(70,60,52,0.15);
    border: 1px solid rgba(80,70,60,0.12);
  }

  /* 裂纹 */
  .crack {
    position: absolute;
    background: linear-gradient(to bottom,
      rgba(230,210,170,0),
      rgba(230,210,170,0.7) 20%,
      rgba(230,210,170,0.5) 80%,
      rgba(230,210,170,0));
    transform-origin: top center;
    filter: drop-shadow(0 0 2px rgba(230,210,170,0.3));
  }
  .crack-1 { left: 30%; top: 5%; width: 2px; height: 65%; transform: rotate(7deg); }
  .crack-2 { left: 55%; top: 12%; width: 2px; height: 50%; transform: rotate(-4deg); }
  .crack-3 { left: 42%; top: 28%; width: 2px; height: 40%; transform: rotate(14deg); }
  .crack-4 { left: 20%; top: 42%; width: 1px; height: 35%; transform: rotate(-9deg); }
  .crack-5 { left: 68%; top: 48%; width: 2px; height: 30%; transform: rotate(11deg); }
  .crack-6 { left: 48%; top: 58%; width: 2px; height: 25%; transform: rotate(2deg); }
  .crack-7 { left: 35%; top: 70%; width: 1px; height: 20%; transform: rotate(-6deg); }
  .crack-8 { left: 62%; top: 22%; width: 1px; height: 28%; transform: rotate(18deg); }

  /* 门缝 */
  .door-seam {
    position: absolute; left: 50%; top: 3%; bottom: 3%;
    width: 4px;
    background: linear-gradient(to bottom,
      rgba(20,16,12,0.8),
      rgba(20,16,12,0.4) 50%,
      rgba(20,16,12,0.8));
    transform: translateX(-50%);
  }

  /* 门缝光 */
  .door-glow {
    position: absolute; left: 50%; top: 5%; bottom: 5%;
    width: 6px;
    transform: translateX(-50%);
    background: linear-gradient(to bottom,
      transparent 0%,
      rgba(240,220,175,0.12) 15%,
      rgba(240,220,175,0.14) 30%,
      rgba(240,220,175,0.18) 50%,
      rgba(240,220,175,0.12) 70%,
      transparent 100%);
    filter: blur(4px);
    z-index: 5;
  }

  /* 碎石 */
  .debris {
    position: absolute; bottom: -8px; left: 0; right: 0;
    height: 40px;
    z-index: 6;
  }
  .rock {
    position: absolute; bottom: 0;
    background: rgba(75,65,55,0.7);
    clip-path: polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%);
  }

  /* 玉佩 */
  .jade {
    position: absolute; right: 75px; bottom: 290px;
    width: 100px; height: 100px;
    z-index: 7;
  }
  .jade-ring {
    position: absolute; inset: 0;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, rgba(215,245,230,0.42), rgba(185,220,205,0.32));
    border: 2px solid rgba(185,225,205,0.55);
    box-shadow: 0 0 45px rgba(165,215,195,0.35);
  }
  .jade-hole {
    position: absolute; left: 50%; top: 50%;
    width: 28px; height: 28px;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    border: 2px solid rgba(140,180,165,0.35);
    background: rgba(0,0,0,0.3);
  }
  .jade-knot {
    position: absolute; left: 50%; top: -6px;
    width: 6px; height: 10px;
    border-radius: 50%;
    transform: translateX(-50%);
    background: rgba(140,60,50,0.7);
  }

  /* 铜钱 */
  .coin {
    position: absolute; left: 55px; bottom: 180px;
    width: 65px; height: 65px;
    z-index: 7;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 40%, rgba(180,150,95,0.55), rgba(135,105,65,0.65));
    border: 2px solid rgba(235,215,155,0.65);
    box-shadow: 0 0 35px rgba(220,195,140,0.3);
  }
  .coin-hole {
    position: absolute; left: 50%; top: 50%;
    width: 18px; height: 18px;
    border: 2px solid rgba(220,195,135,0.35);
    transform: translate(-50%, -50%);
  }
  .coin-line-v { position: absolute; left: 50%; top: 8px; bottom: 8px; width: 2px; background: rgba(220,195,135,0.3); transform: translateX(-50%); }
  .coin-line-h { position: absolute; top: 50%; left: 8px; right: 8px; height: 2px; background: rgba(220,195,135,0.3); transform: translateY(-50%); }

  /* 旧货摊剪影 */
  .market {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 280px;
    z-index: 1;
    background: linear-gradient(180deg, transparent 0%, rgba(28,23,18,0.85) 25%, rgba(18,15,12,0.95) 70%, #0a0806 100%);
  }
  .market-items {
    position: absolute; bottom: 50px; left: 0; right: 0;
    height: 220px;
    z-index: 2;
    display: flex; justify-content: center; gap: 0;
  }
  .item {
    align-self: flex-end;
    background: rgba(78,66,52,0.85);
    margin: 0 12px;
    opacity: 0.75;
  }

  /* 人物剪影 */
  .figure {
    position: absolute; left: 50%; bottom: 95px;
    transform: translateX(-50%);
    z-index: 3;
    opacity: 0.45;
  }
  .figure-body {
    width: 42px; height: 150px;
    background: linear-gradient(to bottom, rgba(190,180,160,0.15), rgba(170,160,140,0.08));
    border-radius: 50% 50% 0 0 / 60% 60% 0 0;
    position: relative;
    margin: 0 auto;
  }
  .figure-head {
    width: 6px; height: 30px;
    border-radius: 50%;
    background: rgba(190,180,160,0.12);
    position: absolute; top: -15px; left: 50%; transform: translateX(-50%);
  }

  /* 书名 */
  .title-group {
    position: absolute; left: 50px; bottom: 300px;
    z-index: 10;
  }
  .title-main {
    font-size: 110px;
    font-weight: 700;
    color: rgba(245,235,210,0.95);
    letter-spacing: 18px;
    text-shadow: 0 0 60px rgba(210,190,140,0.35), 0 4px 20px rgba(0,0,0,0.6);
    line-height: 1;
  }
  .title-line {
    width: 70px; height: 1px;
    background: rgba(220,210,190,0.25);
    margin: 20px 0;
  }
  .title-sub {
    font-size: 20px;
    color: rgba(220,210,190,0.45);
    letter-spacing: 6px;
    font-weight: 300;
  }
  .title-tag {
    font-size: 14px;
    color: rgba(220,210,190,0.3);
    letter-spacing: 4px;
    margin-top: 14px;
  }

  /* 作者 */
  .author {
    position: absolute; right: 50px; bottom: 45px;
    font-size: 21px;
    color: rgba(230,220,195,0.65);
    letter-spacing: 3px;
    z-index: 10;
  }

  /* 分类 */
  .genre-tag {
    position: absolute; right: 35px; top: 35px;
    z-index: 10;
    font-size: 13px;
    color: rgba(220,210,190,0.28);
    letter-spacing: 8px;
    writing-mode: vertical-rl;
  }

  /* 飘散颗粒 */
  .particles {
    position: absolute; inset: 0;
    z-index: 6;
    pointer-events: none;
  }
  .particle {
    position: absolute;
    border-radius: 50%;
    background: rgba(220,205,175,0.4);
    animation: float linear infinite;
  }
  @keyframes float {
    0% { transform: translateY(0) translateX(0); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 0.75; }
    100% { transform: translateY(-140px) translateX(40px); opacity: 0; }
  }
</style>
</head>
<body>
<div class="cover">
  <div class="bg"></div>

  <!-- 云层 -->
  <div class="clouds">
    <div class="cloud"></div>
    <div class="cloud"></div>
    <div class="cloud"></div>
    <div class="cloud"></div>
  </div>

  <!-- 暗角 -->
  <div class="vignette"></div>
  <div class="vignette-bottom"></div>

  <!-- 岁蚀侵蚀 -->
  <div class="erosion"></div>
  <div class="erosion-edge"></div>
  <div class="erosion-edge"></div>
  <div class="erosion-edge"></div>
  <div class="erosion-edge"></div>

  <!-- 石门 -->
  <div class="door">
    <div class="door-bg"></div>
    <div class="door-frame"></div>
    <div class="door-inner-frame"></div>
    <div class="door-seam"></div>
    <div class="door-glow"></div>

    <!-- 裂纹 -->
    <div class="crack crack-1"></div>
    <div class="crack crack-2"></div>
    <div class="crack crack-3"></div>
    <div class="crack crack-4"></div>
    <div class="crack crack-5"></div>
    <div class="crack crack-6"></div>
    <div class="crack crack-7"></div>
    <div class="crack crack-8"></div>

    <!-- 碎石 -->
    <div class="debris">
      <div class="rock" style="left: 5%; width: 18px; height: 14px;"></div>
      <div class="rock" style="left: 12%; width: 14px; height: 10px;"></div>
      <div class="rock" style="left: 22%; width: 22px; height: 16px;"></div>
      <div class="rock" style="left: 35%; width: 6px; height: 12px;"></div>
      <div class="rock" style="left: 48%; width: 20px; height: 15px;"></div>
      <div class="rock" style="left: 58%; width: 15px; height: 11px;"></div>
      <div class="rock" style="left: 68%; width: 24px; height: 17px;"></div>
      <div class="rock" style="left: 78%; width: 17px; height: 13px;"></div>
      <div class="rock" style="left: 88%; width: 20px; height: 14px;"></div>
    </div>
  </div>

  <!-- 玉佩 -->
  <div class="jade">
    <div class="jade-ring"></div>
    <div class="jade-hole"></div>
    <div class="jade-knot"></div>
  </div>

  <!-- 铜钱 -->
  <div class="coin">
    <div class="coin-hole"></div>
    <div class="coin-line-v"></div>
    <div class="coin-line-h"></div>
  </div>

  <!-- 旧货摊剪影 -->
  <div class="market"></div>
  <div class="market-items">
    <div class="item" style="width: 45px; height: 70px; clip-path: polygon(0 15%, 15% 0, 85% 0, 100% 15%, 100% 100%, 0 100%);"></div>
    <div class="item" style="width: 35px; height: 110px;"></div>
    <div class="item" style="width: 55px; height: 85px; clip-path: polygon(0 15%, 15% 0, 85% 0, 100% 15%, 100% 100%, 0 100%);"></div>
    <div class="item" style="width: 6px; height: 130px;"></div>
    <div class="item" style="width: 50px; height: 60px; clip-path: polygon(0 15%, 15% 0, 85% 0, 100% 15%, 100% 100%, 0 100%);"></div>
    <div class="item" style="width: 40px; height: 95px;"></div>
    <div class="item" style="width: 48px; height: 75px; clip-path: polygon(0 15%, 15% 0, 85% 0, 100% 15%, 100% 100%, 0 100%);"></div>
    <div class="item" style="width: 35px; height: 115px;"></div>
  </div>

  <!-- 少年背影 -->
  <div class="figure">
    <div class="figure-head"></div>
    <div class="figure-body"></div>
  </div>

  <!-- 书名 -->
  <div class="title-group">
    <div class="title-main">岁蚀</div>
    <div class="title-line"></div>
    <div class="title-sub">一扇门 · 三枚铜钱 · 两种未来</div>
    <div class="title-tag">玄幻 · 东方经典</div>
  </div>

  <!-- 作者 -->
  <div class="author">翻遍古籍找名字</div>

  <!-- 分类 -->
  <div class="genre-tag">玄 幻</div>

  <!-- 飘散颗粒 -->
  <div class="particles">
    <div class="particle" style="width: 2px; height: 2px; top: 12%; left: 18%; animation-duration: 9s;"></div>
    <div class="particle" style="width: 1px; height: 1px; top: 22%; left: 58%; animation-duration: 12s;"></div>
    <div class="particle" style="width: 2px; height: 2px; top: 38%; left: 42%; animation-duration: 14s;"></div>
    <div class="particle" style="width: 1px; height: 1px; top: 52%; left: 72%; animation-duration: 10s;"></div>
    <div class="particle" style="width: 3px; height: 3px; top: 8%; left: 78%; animation-duration: 13s;"></div>
    <div class="particle" style="width: 1px; height: 1px; top: 62%; left: 12%; animation-duration: 11s;"></div>
    <div class="particle" style="width: 2px; height: 2px; top: 45%; left: 25%; animation-duration: 15s;"></div>
    <div class="particle" style="width: 1px; height: 1px; top: 28%; left: 85%; animation-duration: 8s;"></div>
    <div class="particle" style="width: 2px; height: 2px; top: 70%; left: 65%; animation-duration: 12s;"></div>
    <div class="particle" style="width: 1px; height: 1px; top: 15%; left: 35%; animation-duration: 10s;"></div>
  </div>
</div>
</body>
</html>
