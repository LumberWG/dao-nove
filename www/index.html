<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>岁蚀 · 在线阅读</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, 'Noto Sans SC', sans-serif; background: #f5f3ef; color: #2c2c2c; }
.container { max-width: 1400px; margin: 0 auto; display: flex; min-height: 100vh; }
.sidebar { width: 280px; background: #fff; border-right: 1px solid #e0dcd5; padding: 24px; overflow-y: auto; position: sticky; top: 0; height: 100vh; flex-shrink: 0; }
.sidebar h1 { font-size: 20px; margin-bottom: 4px; color: #1a1a1a; }
.sidebar .subtitle { font-size: 12px; color: #999; margin-bottom: 20px; }
.sidebar h2 { font-size: 13px; color: #666; margin: 16px 0 6px; text-transform: uppercase; letter-spacing: 1px; }
.sidebar a { display: block; padding: 4px 0; font-size: 14px; color: #444; text-decoration: none; border-bottom: 1px solid #f0eee8; }
.sidebar a:hover { color: #c0392b; }
.sidebar .arc-label { font-size: 11px; color: #aaa; padding: 2px 0; }
.sidebar .active { color: #c0392b; font-weight: 600; }
.main { flex: 1; padding: 40px 48px; max-width: 800px; line-height: 1.8; }
.main h1 { font-size: 26px; margin-bottom: 20px; }
.main p { margin-bottom: 1em; }
.main hr { border: none; border-top: 1px solid #e0dcd5; margin: 2em 0; }
.main strong { color: #1a1a1a; }
#content { min-height: 60vh; }
#welcome { text-align: center; padding: 100px 0; color: #999; }
#welcome h2 { font-size: 28px; color: #ccc; margin-bottom: 12px; }
.loading { text-align: center; padding: 60px; color: #aaa; }
@media(max-width:768px){
  .container { flex-direction: column; }
  .sidebar { width: 100%; height: auto; position: static; padding: 16px; }
  .main { padding: 20px; }
}
</style>
</head>
<body>
<div class="container">
  <nav class="sidebar" id="sidebar"></nav>
  <div class="main">
    <div id="welcome">
      <h2>岁蚀</h2>
      <p>选择一个章节开始阅读</p>
    </div>
    <div id="content" style="display:none"></div>
  </div>
</div>

const docs = [

  {d:'弧2_序隙之裂_细纲', f:'弧2_序隙之裂_细纲'},
  {d:'感情线设计', f:'感情线设计'},
  {d:'第1-20章完成报告', f:'第1-20章完成报告'}
];

let currentArc = '';

function renderSidebar() {
  const sb = document.getElementById('sidebar');
  let html = '<h1>岁蚀</h1><div class="subtitle">在线阅读</div>';
  html += '<h2>章节</h2>';
  let lastArc = '';
  chapters.forEach(ch => {
    if (ch.a !== lastArc) {
      html += `<div class="arc-label">${ch.a}</div>`;
      lastArc = ch.a;
    }
    const num = ch.n.toString().padStart(2,'0');
    html += `<a href="#" onclick="loadChapter(${ch.n});return false" id="chlink-${ch.n}">${num}. ${ch.t}</a>`;
  });
  html += '<h2>设定文档</h2>';
  docs.forEach(d => {
    html += `<a href="#" onclick="loadDoc('${d.f}');return false" id="doclink-${d.f}">${d.d}</a>`;
  });
  sb.innerHTML = html;
}

async function loadChapter(n) {
  document.getElementById('welcome').style.display = 'none';
  document.getElementById('content').style.display = 'block';
  document.getElementById('content').innerHTML = '<div class="loading">加载中...</div>';
  document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
  const link = document.getElementById(`chlink-${n}`);
  if(link) link.classList.add('active');
  const num = n.toString().padStart(2,'0');
  const ch = chapters.find(c => c.n === n);
  try {
    const resp = await fetch(`chapters/新_第${num}章_${ch.t}.md`);
    if(!resp.ok) throw new Error('404');
    const text = await resp.text();
    const html = marked.parse(text);
    document.getElementById('content').innerHTML = html;
    window.scrollTo(0, 0);
  } catch(e) {
    document.getElementById('content').innerHTML = '<p>章节加载失败</p>';
  }
}

async function loadDoc(name) {
  document.getElementById('welcome').style.display = 'none';
  document.getElementById('content').style.display = 'block';
  document.getElementById('content').innerHTML = '<div class="loading">加载中...</div>';
  document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
  const link = document.getElementById(`doclink-${name}`);
  if(link) link.classList.add('active');
  try {
    const resp = await fetch(`docs/${name}.md`);
    if(!resp.ok) throw new Error('404');
    const text = await resp.text();
    const html = marked.parse(text);
    document.getElementById('content').innerHTML = html;
    window.scrollTo(0, 0);
  } catch(e) {
    document.getElementById('content').innerHTML = '<p>文档加载失败</p>';
  }
}

renderSidebar();
