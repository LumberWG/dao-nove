<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>岁蚀 · 封面</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<style>
body { background: #0d0b09; margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
.cover-wrap {
  max-width: 600px;
  width: 100%;
  margin: 20px auto;
  box-shadow: 0 20px 60px rgba(0,0,0,0.9);
  border-radius: 4px;
  overflow: hidden;
}
.cover-wrap img { width: 100%; height: auto; display: block; }
.cover-nav {
  display: flex; gap: 12px; justify-content: center;
  padding: 20px; flex-wrap: wrap;
}
.cover-nav a {
  color: rgba(180,160,140,0.5); font-size: 13px;
  transition: color 0.15s; letter-spacing: 2px;
}
.cover-nav a:hover { color: #c4943c; }
.cover-info {
  text-align: center; padding: 0 20px 40px;
  color: rgba(180,160,140,0.2); font-size: 11px;
  letter-spacing: 3px;
}
@media (max-width: 640px) {
  .cover-wrap { margin: 10px; width: auto; }
}
</style>
</head>
<body>

<div style="padding:16px 0;text-align:center;width:100%">
  <a href="/" style="color:rgba(180,160,140,0.3);font-size:12px;letter-spacing:2px">← 返回目录</a>
</div>

<div class="cover-wrap">
  <img src="{{ url_for('cover_image') }}" alt="岁蚀封面">
</div>

<div class="cover-nav">
  <a href="/">📖 章节目录</a>
  <a href="/docs">📋 设定文档</a>
  <a href="/publish">✏️ 发布新章</a>
</div>

<div class="cover-info">岁蚀 · SUI EROSION · 全七卷</div>

</body>
</html>
