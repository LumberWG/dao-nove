<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>编辑 · {{ title }}</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container">
  <header>
    <h1><a href="/">📖 小说管理</a></h1>
    <a href="/docs/view/{{ filename }}" class="back-link">← 返回文档</a>
  </header>

  <main>
    <h2>编辑 · {{ title }}</h2>
    <form method="POST" class="publish-form">
      <div class="form-group">
        <label for="content">文档内容（Markdown 格式）</label>
        <textarea id="content" name="content" rows="40" required>{{ content }}</textarea>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn-primary">💾 保存</button>
        <a href="/docs/view/{{ filename }}" class="btn-cancel">取消</a>
      </div>
    </form>
  </main>
</div>
</body>
</html>
